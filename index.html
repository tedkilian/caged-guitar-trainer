<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAGED System Guitar Trainer</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d1a;--surface:#161628;--surface2:#1e1e38;--border:#2a2a4a;
      --text:#e8e8f0;--muted:#7070a0;
      --root:#ff5252;--third:#ffd740;--fifth:#69f0ae;--scale:#40c4ff;
      --C:#e74c3c;--A:#e67e22;--G:#27ae60;--E:#2980b9;--D:#8e44ad;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

    /* ── Header ── */
    header{
      background:linear-gradient(135deg,#13132a 0%,#1a1a35 100%);
      border-bottom:2px solid var(--C);
      padding:18px 32px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .logo-area h1{
      font-size:26px;font-weight:800;letter-spacing:-0.5px;
      background:linear-gradient(90deg,#ff5252,#ffd740,#69f0ae);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .logo-area p{font-size:13px;color:var(--muted);margin-top:2px}
    .header-badge{
      font-size:12px;color:var(--muted);text-align:right;line-height:1.6;
    }

    /* ── Layout ── */
    .container{max-width:1200px;margin:0 auto;padding:24px 20px}

    /* ── Controls ── */
    .controls{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:18px 20px;margin-bottom:20px;
      display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end;
    }
    .ctrl{display:flex;flex-direction:column;gap:7px}
    .ctrl-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
    .btn-row{display:flex;gap:5px;flex-wrap:wrap}
    button{
      padding:7px 14px;border:1px solid var(--border);background:var(--surface2);
      color:var(--text);border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;
      transition:all .15s;
    }
    button:hover{border-color:#4a4a7a;background:#252550}
    button.active{color:#fff}

    .key-btn.active{background:#3a3a6a;border-color:#7070cc}
    .shape-btn[data-s="C"].active{background:var(--C);border-color:var(--C)}
    .shape-btn[data-s="A"].active{background:var(--A);border-color:var(--A)}
    .shape-btn[data-s="G"].active{background:var(--G);border-color:var(--G)}
    .shape-btn[data-s="E"].active{background:var(--E);border-color:var(--E)}
    .shape-btn[data-s="D"].active{background:var(--D);border-color:var(--D)}
    .shape-btn[data-s="ALL"].active{
      background:linear-gradient(90deg,var(--C),var(--A),var(--G),var(--E),var(--D));
      border-color:#888;
    }
    .mode-btn.active{background:#3d2b6b;border-color:#7050bb}

    /* ── Fretboard ── */
    .fb-section{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:20px;margin-bottom:20px;
    }
    .fb-wrap{overflow-x:auto;padding-bottom:4px}
    .fb-wrap svg{display:block;min-width:860px}

    /* ── Legend ── */
    .legend{
      display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;font-size:12px;color:var(--muted);
    }
    .leg{display:flex;align-items:center;gap:6px}
    .leg-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}

    /* ── Bottom grid ── */
    .bottom-grid{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-bottom:20px}
    @media(max-width:800px){.bottom-grid{grid-template-columns:1fr}}

    /* ── Chord Box ── */
    .chord-box-card{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;
    }
    .chord-box-card h3{font-size:15px;margin-bottom:14px;color:#ccc}
    .chord-box-wrap{display:flex;justify-content:center}

    /* ── Shape Info ── */
    .shape-info{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;
    }
    .shape-info h2{font-size:20px;font-weight:700;margin-bottom:8px}
    .shape-info .tag{
      display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;
      font-weight:700;letter-spacing:1px;margin-bottom:12px;
    }
    .shape-info p{font-size:14px;line-height:1.7;color:#bbb;margin-bottom:10px}
    .tips{list-style:none;display:flex;flex-direction:column;gap:6px}
    .tips li{
      font-size:13px;color:#aaa;padding:7px 12px;
      background:var(--surface2);border-radius:6px;
      border-left:3px solid var(--muted);
      line-height:1.5;
    }

    /* ── Lessons ── */
    .lessons{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;
    }
    .lessons h2{font-size:20px;font-weight:700;margin-bottom:16px}
    .lesson-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
    .ltab{
      padding:7px 14px;border:1px solid var(--border);background:var(--surface2);
      color:var(--muted);border-radius:7px;cursor:pointer;font-size:13px;
      transition:all .15s;
    }
    .ltab:hover{color:var(--text);border-color:#4a4a7a}
    .ltab.active{background:#2a1540;border-color:#7050bb;color:#d090ff}
    .lpanel{display:none}
    .lpanel.active{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:700px){.lpanel.active{grid-template-columns:1fr}}

    .video-area{
      background:#000;border-radius:8px;overflow:hidden;
      aspect-ratio:16/9;position:relative;
    }
    .video-area iframe{width:100%;height:100%;border:0}
    .yt-placeholder{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;min-height:200px;background:#111;gap:12px;
      color:#555;font-size:13px;text-align:center;padding:20px;
    }
    .yt-placeholder .yt-icon{font-size:44px}
    .yt-link{
      display:inline-flex;align-items:center;gap:7px;
      padding:8px 18px;background:#c00;color:#fff;
      border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;
      transition:background .15s;margin-top:4px;
    }
    .yt-link:hover{background:#e00}
    .lesson-text h3{font-size:17px;font-weight:700;margin-bottom:10px;color:#e0d0ff}
    .lesson-text p{font-size:13px;line-height:1.8;color:#bbb;margin-bottom:12px}
    .lesson-text h4{font-size:13px;font-weight:600;margin-bottom:6px;color:#ccc;text-transform:uppercase;letter-spacing:.8px}
    .lesson-text ul{list-style:none;display:flex;flex-direction:column;gap:4px}
    .lesson-text ul li{
      font-size:13px;color:#aaa;padding:5px 10px;
      background:var(--surface2);border-radius:5px;
    }
    .lesson-text ul li::before{content:"→ ";color:var(--muted)}

    /* ── Progress nav ── */
    .shape-nav{display:flex;gap:8px;margin-bottom:20px;justify-content:center}
    .snav{
      width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-weight:800;font-size:15px;cursor:pointer;
      border:2px solid transparent;transition:all .2s;
    }
    .snav:hover{transform:scale(1.1)}
    .snav[data-s="C"]{background:var(--C)22;border-color:var(--C);color:var(--C)}
    .snav[data-s="A"]{background:var(--A)22;border-color:var(--A);color:var(--A)}
    .snav[data-s="G"]{background:var(--G)22;border-color:var(--G);color:var(--G)}
    .snav[data-s="E"]{background:var(--E)22;border-color:var(--E);color:var(--E)}
    .snav[data-s="D"]{background:var(--D)22;border-color:var(--D);color:var(--D)}
    .snav.active{transform:scale(1.15)}
    .snav[data-s="C"].active{background:var(--C);color:#fff}
    .snav[data-s="A"].active{background:var(--A);color:#fff}
    .snav[data-s="G"].active{background:var(--G);color:#fff}
    .snav[data-s="E"].active{background:var(--E);color:#fff}
    .snav[data-s="D"].active{background:var(--D);color:#fff}
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>CAGED System Guitar Trainer</h1>
    <p>Master the fretboard with 5 shapes in any key</p>
  </div>
  <div class="header-badge">
    Based on lessons by<br><strong>Eddie Haddad</strong> · Guitar Mastery Method
  </div>
</header>

<div class="container">

  <!-- Controls -->
  <div class="controls">
    <div class="ctrl">
      <div class="ctrl-label">Key</div>
      <div class="btn-row" id="keyBtns"></div>
    </div>
    <div class="ctrl">
      <div class="ctrl-label">Shape</div>
      <div class="btn-row" id="shapeBtns"></div>
    </div>
    <div class="ctrl">
      <div class="ctrl-label">View</div>
      <div class="btn-row" id="modeBtns"></div>
    </div>
  </div>

  <!-- Fretboard -->
  <div class="fb-section">
    <div class="fb-wrap">
      <svg id="fretboard" class="fretboard"></svg>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- Bottom grid: chord box + info -->
  <div class="bottom-grid">
    <div class="chord-box-card">
      <h3 id="chordBoxTitle">Chord Voicing</h3>
      <div class="chord-box-wrap">
        <svg id="chordBox" width="160" height="200"></svg>
      </div>
    </div>
    <div class="shape-info" id="shapeInfo"></div>
  </div>

  <!-- Lessons -->
  <div class="lessons">
    <h2>Lessons · Eddie Haddad Style</h2>
    <div class="shape-nav" id="shapeNav"></div>
    <div class="lesson-tabs" id="lessonTabs"></div>
    <div id="lessonPanels"></div>
  </div>

</div><!-- /container -->

<script>
// ═══════════════════════════════════════════════════════════════
// MUSIC THEORY DATA
// ═══════════════════════════════════════════════════════════════

const KEYS = [
  {name:'C', val:0}, {name:'C#/Db', val:1}, {name:'D', val:2},
  {name:'Eb', val:3}, {name:'E', val:4}, {name:'F', val:5},
  {name:'F#/Gb', val:6}, {name:'G', val:7}, {name:'Ab', val:8},
  {name:'A', val:9}, {name:'Bb', val:10}, {name:'B', val:11},
];

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// String open notes (C=0), index 0=low E string, 5=high e string
const STR_OPEN = [4, 9, 2, 7, 11, 4];
const STR_NAME = ['E','A','D','G','B','e'];

const MAJOR_SCALE = [0,2,4,5,7,9,11];
const CHORD_TONES = [0,4,7]; // root, M3, P5

// CAGED shapes: voicing = fret offsets from anchor fret, -1=muted
const SHAPES = {
  C: {
    label:'C', name:'C Shape', anchor:1,
    voicing:[-1, 0, -1, -3, -2, -3],
    color:'#e74c3c', window:[-3,2],
    rootStrings:[1,4] // string indices (from low E) where root appears in voicing
  },
  A: {
    label:'A', name:'A Shape', anchor:1,
    voicing:[-1, 0, 2, 2, 2, 0],
    color:'#e67e22', window:[0,5],
    rootStrings:[1,3]
  },
  G: {
    label:'G', name:'G Shape', anchor:0,
    voicing:[0, -1, -3, -3, -3, 0],
    color:'#27ae60', window:[-3,2],
    rootStrings:[0,3,5]
  },
  E: {
    label:'E', name:'E Shape', anchor:0,
    voicing:[0, 2, 2, 1, 0, 0],
    color:'#2980b9', window:[0,5],
    rootStrings:[0,2,5]
  },
  D: {
    label:'D', name:'D Shape', anchor:2,
    voicing:[-1, -1, 0, 2, 3, 2],
    color:'#8e44ad', window:[0,5],
    rootStrings:[2,4]
  }
};
const SHAPE_ORDER = ['C','A','G','E','D'];

// ═══════════════════════════════════════════════════════════════
// MUSIC THEORY HELPERS
// ═══════════════════════════════════════════════════════════════

function getAnchorFret(key, sh) {
  const shape = SHAPES[sh];
  const openNote = STR_OPEN[shape.anchor];
  let fret = ((key - openNote) % 12 + 12) % 12;
  const minOff = Math.min(...shape.voicing.filter(v => v !== -1));
  if (fret + minOff < 0) fret += 12;
  return fret;
}

function getWindow(key, sh) {
  const anchor = getAnchorFret(key, sh);
  const [s, e] = SHAPES[sh].window;
  return { start: Math.max(0, anchor + s), end: anchor + e };
}

function noteAt(si, fret) { return (STR_OPEN[si] + fret) % 12; }

function interval(note, key) { return (note - key + 12) % 12; }

function isScale(note, key) { return MAJOR_SCALE.includes(interval(note, key)); }
function isChord(note, key) { return CHORD_TONES.includes(interval(note, key)); }
function isRoot(note, key) { return (note % 12) === (key % 12); }

function noteName(n) { return NOTE_NAMES[n % 12]; }
function intervalName(iv) {
  return ['R','b2','2','b3','3','4','#4','5','b6','6','b7','7'][iv];
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

const state = { key: 0, shape: 'C', mode: 'chord', lesson: 'intro' };

// ═══════════════════════════════════════════════════════════════
// FRETBOARD RENDERER
// ═══════════════════════════════════════════════════════════════

function renderFretboard() {
  const svg = document.getElementById('fretboard');
  svg.innerHTML = '';

  const FRETS = 15;         // frets to display (0=open, 1-15)
  const NUT_X = 54;
  const FW = 58;            // fret width
  const SH = 32;            // string height
  const TOP = 24;
  const BOT = 32;
  const W = NUT_X + FRETS * FW + 20;
  const H = TOP + 5 * SH + BOT;

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const sx = f => f === 0 ? NUT_X - 22 : NUT_X + (f - 0.5) * FW;
  // Display order: high e (idx 5) at top, low E (idx 0) at bottom
  const DISP = [5,4,3,2,1,0];
  const sy = di => TOP + di * SH;

  // ── Shape window highlight ──
  if (state.shape !== 'ALL') {
    const win = getWindow(state.key, state.shape);
    const x1 = win.start === 0 ? NUT_X - 30 : NUT_X + win.start * FW;
    const x2 = NUT_X + win.end * FW;
    const rect = el('rect', {
      x: x1, y: TOP - 4, width: x2 - x1, height: 5 * SH + 8,
      fill: SHAPES[state.shape].color + '18',
      stroke: SHAPES[state.shape].color + '55',
      'stroke-width': 1.5, rx: 6
    });
    svg.appendChild(rect);
  } else {
    // Highlight all 5 shape windows
    SHAPE_ORDER.forEach(sh => {
      const win = getWindow(state.key, sh);
      const x1 = win.start === 0 ? NUT_X - 30 : NUT_X + win.start * FW;
      const x2 = NUT_X + win.end * FW;
      const rect = el('rect', {
        x: x1, y: TOP - 4, width: x2 - x1, height: 5 * SH + 8,
        fill: SHAPES[sh].color + '12',
        stroke: SHAPES[sh].color + '40',
        'stroke-width': 1, rx: 6
      });
      svg.appendChild(rect);
    });
  }

  // ── Nut ──
  svg.appendChild(el('rect', { x: NUT_X - 5, y: TOP, width: 5, height: 5*SH, fill: '#aaa', rx:1 }));

  // ── Fret lines ──
  for (let f = 1; f <= FRETS; f++) {
    const x = NUT_X + f * FW;
    svg.appendChild(el('line', {
      x1:x, y1:TOP, x2:x, y2:TOP+5*SH,
      stroke: f === 12 ? '#666' : '#333', 'stroke-width': f===12 ? 2 : 1
    }));
  }

  // ── Fret markers ──
  [3,5,7,9,12].forEach(f => {
    if (f > FRETS) return;
    const x = NUT_X + (f - 0.5) * FW;
    const y = H - 14;
    if (f === 12) {
      svg.appendChild(elDot(x - 8, y, 4, '#555'));
      svg.appendChild(elDot(x + 8, y, 4, '#555'));
    } else {
      svg.appendChild(elDot(x, y, 4, '#555'));
    }
    const t = el('text', { x, y: H - 2, 'text-anchor':'middle', 'font-size':'11', fill:'#555' });
    t.textContent = f;
    svg.appendChild(t);
  });

  // ── Strings ──
  DISP.forEach((si, di) => {
    const y = sy(di);
    svg.appendChild(el('line', {
      x1: NUT_X - 28, y1:y, x2: W - 8, y2:y,
      stroke: '#555', 'stroke-width': String(0.8 + (5-di) * 0.4)
    }));
    const t = el('text', { x:10, y: y+4, 'text-anchor':'middle', 'font-size':'11', fill:'#666' });
    t.textContent = STR_NAME[si];
    svg.appendChild(t);
  });

  // ── Notes ──
  const dots = collectDots();
  dots.forEach(d => {
    const x = sx(d.fret);
    const y = sy(DISP.indexOf(d.si));
    // circle
    svg.appendChild(elDot(x, y, 13, d.color));
    // border for root
    if (d.isRoot) svg.appendChild(el('circle', {
      cx:x, cy:y, r:14, fill:'none',
      stroke: '#fff', 'stroke-width': 1.5
    }));
    // label
    const t = el('text', {
      x, y: y+4, 'text-anchor':'middle',
      'font-size': d.label.length > 2 ? '9' : '10',
      fill: '#fff', 'font-weight':'700'
    });
    t.textContent = d.label;
    svg.appendChild(t);
  });

  // ── Open string X/O markers ──
  if (state.shape !== 'ALL') {
    const voicing = computeVoicing(state.key, state.shape);
    DISP.forEach((si, di) => {
      const fret = voicing[si];
      if (fret === -1) {
        // X = muted
        const x = NUT_X - 22, y = sy(di);
        const t = el('text', { x, y: y+5, 'text-anchor':'middle', 'font-size':'14', fill:'#555', 'font-weight':'700' });
        t.textContent = '×';
        svg.appendChild(t);
      }
    });
  }

  updateLegend();
}

function collectDots() {
  const dots = [];
  const { key, shape, mode } = state;
  const DISP = [5,4,3,2,1,0];

  if (shape === 'ALL') {
    // Show all major scale notes; tint by which shape "owns" them
    for (let si = 0; si < 6; si++) {
      for (let f = 0; f <= 15; f++) {
        const note = noteAt(si, f);
        if (!isScale(note, key)) continue;
        const iv = interval(note, key);
        const color = isRoot(note, key) ? 'var(--root)'
          : iv === 4 ? 'var(--third)'
          : iv === 7 ? 'var(--fifth)'
          : '#3a3a6a';
        dots.push({ si, fret: f, note, color, isRoot: isRoot(note, key), label: intervalName(iv) });
      }
    }
    // Overlay chord dots for each shape
    SHAPE_ORDER.forEach(sh => {
      const vc = computeVoicing(key, sh);
      for (let si = 0; si < 6; si++) {
        if (vc[si] < 0) continue;
        const note = noteAt(si, vc[si]);
        const existing = dots.find(d => d.si === si && d.fret === vc[si]);
        if (existing) existing.color = SHAPES[sh].color;
      }
    });
    return dots;
  }

  const win = getWindow(key, shape);

  for (let si = 0; si < 6; si++) {
    if (mode === 'chord') {
      // Only chord voicing dots
      const vc = computeVoicing(key, shape);
      if (vc[si] < 0) continue;
      const fret = vc[si];
      const note = noteAt(si, fret);
      const iv = interval(note, key);
      const color = isRoot(note, key) ? SHAPES[shape].color
        : iv === 4 ? 'var(--third)' : 'var(--fifth)';
      dots.push({ si, fret, note, color, isRoot: isRoot(note, key), label: noteName(note) });
    } else {
      // Scale or arpeggio: show notes in window
      for (let f = win.start; f <= Math.min(win.end + 1, 15); f++) {
        const note = noteAt(si, f);
        if (!isScale(note, key)) continue;
        if (mode === 'arpeggio' && !isChord(note, key)) continue;
        const iv = interval(note, key);
        const color = isRoot(note, key) ? SHAPES[shape].color
          : iv === 4 ? 'var(--third)'
          : iv === 7 ? 'var(--fifth)'
          : 'var(--scale)';
        dots.push({ si, fret: f, note, color, isRoot: isRoot(note, key), label: intervalName(iv) });
      }
    }
  }
  return dots;
}

function computeVoicing(key, sh) {
  const shape = SHAPES[sh];
  const anchor = getAnchorFret(key, sh);
  return shape.voicing.map(v => v === -1 ? -1 : anchor + v);
}

// ═══════════════════════════════════════════════════════════════
// CHORD BOX
// ═══════════════════════════════════════════════════════════════

function renderChordBox() {
  const svg = document.getElementById('chordBox');
  svg.innerHTML = '';
  const { key, shape } = state;

  if (shape === 'ALL') {
    const t = el('text', { x:80, y:100, 'text-anchor':'middle', fill:'#666', 'font-size':'13' });
    t.textContent = 'Select a shape';
    svg.appendChild(t);
    return;
  }

  const vc = computeVoicing(key, shape);
  const anchor = getAnchorFret(key, shape);
  const minFret = Math.max(1, Math.min(...vc.filter(v => v > 0)));
  const maxFret = Math.max(...vc.filter(v => v >= 0));
  const startFret = minFret;
  const numFrets = Math.max(4, maxFret - startFret + 1);

  const CW = 160, CH = 200;
  const LEFT = 28, TOP = 28;
  const CX = (CW - LEFT - 12) / 5; // col spacing
  const RH = (CH - TOP - 30) / numFrets;

  svg.setAttribute('width', CW);
  svg.setAttribute('height', CH);

  // nut or position number
  if (startFret === 1) {
    svg.appendChild(el('rect', { x:LEFT, y:TOP, width: CX*5, height:4, fill:'#aaa' }));
  } else {
    const t = el('text', { x:LEFT-4, y:TOP+RH*0.6, 'text-anchor':'end', 'font-size':'12', fill:'#888' });
    t.textContent = startFret + 'fr';
    svg.appendChild(t);
    svg.appendChild(el('line', { x1:LEFT, y1:TOP, x2:LEFT+CX*5, y2:TOP, stroke:'#555', 'stroke-width':1 }));
  }

  // fret lines
  for (let r = 0; r <= numFrets; r++) {
    const y = TOP + r * RH;
    svg.appendChild(el('line', { x1:LEFT, y1:y, x2:LEFT+CX*5, y2:y, stroke:'#444', 'stroke-width':1 }));
  }

  // string lines + X/O
  const DISP = [5,4,3,2,1,0];
  DISP.forEach((si, ci) => {
    const x = LEFT + ci * CX;
    svg.appendChild(el('line', { x1:x, y1:TOP, x2:x, y2:TOP+numFrets*RH, stroke:'#555', 'stroke-width': String(0.8+(5-ci)*0.2) }));
    const fret = vc[si];
    if (fret === -1) {
      const t = el('text', { x, y:TOP-8, 'text-anchor':'middle', 'font-size':'13', fill:'#666' });
      t.textContent = '×';
      svg.appendChild(t);
    } else if (fret === 0) {
      svg.appendChild(el('circle', { cx:x, cy:TOP-9, r:5, fill:'none', stroke:'#888', 'stroke-width':1.5 }));
    }
  });

  // dots
  DISP.forEach((si, ci) => {
    const fret = vc[si];
    if (fret <= 0) return;
    const row = fret - startFret;
    const x = LEFT + ci * CX;
    const y = TOP + row * RH + RH/2;
    const note = noteAt(si, fret);
    const root = isRoot(note, key);
    svg.appendChild(elDot(x, y, 10, root ? SHAPES[shape].color : '#555'));
    const t = el('text', { x, y:y+4, 'text-anchor':'middle', 'font-size':'9', fill:'#fff', 'font-weight':'700' });
    t.textContent = noteName(note);
    svg.appendChild(t);
  });

  // title
  const kname = KEYS.find(k=>k.val===key).name;
  const title = document.getElementById('chordBoxTitle');
  title.textContent = `${kname} — ${SHAPES[shape].name}`;
}

// ═══════════════════════════════════════════════════════════════
// CONTROLS SETUP
// ═══════════════════════════════════════════════════════════════

function buildControls() {
  // Key buttons
  const kb = document.getElementById('keyBtns');
  KEYS.forEach(k => {
    const b = document.createElement('button');
    b.textContent = k.name;
    b.className = 'key-btn' + (k.val === state.key ? ' active' : '');
    b.onclick = () => { state.key = k.val; update(); };
    kb.appendChild(b);
  });

  // Shape buttons
  const sb = document.getElementById('shapeBtns');
  [...SHAPE_ORDER, 'ALL'].forEach(s => {
    const b = document.createElement('button');
    b.textContent = s === 'ALL' ? 'All Shapes' : s;
    b.className = 'shape-btn' + (s === state.shape ? ' active' : '');
    b.dataset.s = s;
    b.onclick = () => { state.shape = s; update(); };
    sb.appendChild(b);
  });

  // Mode buttons
  const mb = document.getElementById('modeBtns');
  [['chord','Chord'],['scale','Scale'],['arpeggio','Arpeggio']].forEach(([val,label]) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.className = 'mode-btn' + (val === state.mode ? ' active' : '');
    b.onclick = () => { state.mode = val; update(); };
    mb.appendChild(b);
  });
}

function updateControls() {
  document.querySelectorAll('.key-btn').forEach((b,i) => b.classList.toggle('active', KEYS[i].val===state.key));
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('active', b.dataset.s===state.shape));
  document.querySelectorAll('.mode-btn').forEach(b => {
    const modes = ['chord','scale','arpeggio'];
    b.classList.toggle('active', modes[document.querySelectorAll('.mode-btn').length===3?['chord','scale','arpeggio'].indexOf(b.textContent.toLowerCase()):0]===state.mode);
  });
  // Re-render mode buttons active state cleanly
  document.querySelectorAll('.mode-btn').forEach(b => {
    const map = {Chord:'chord',Scale:'scale',Arpeggio:'arpeggio'};
    b.classList.toggle('active', map[b.textContent]===state.mode);
  });
}

function setLesson(id) {
  state.lesson = id;
  if (SHAPES[id]) { state.shape = id; updateControls(); }
  renderLessons();
  renderFretboard();
  renderChordBox();
  renderShapeInfo();
}

// ═══════════════════════════════════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════════════════════════════════

function el(tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function elDot(x, y, r, fill) {
  return el('circle', { cx:x, cy:y, r:String(r), fill });
}

// MAIN UPDATE
// ═══════════════════════════════════════════════════════════════

function update() {
  updateControls();
  renderFretboard();
  renderChordBox();
  renderShapeInfo();
}

// Init
buildControls();
renderFretboard();
renderChordBox();
renderShapeInfo();
renderLessons();
</script>
